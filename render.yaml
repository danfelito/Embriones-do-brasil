services:
  - type: web
    name: embriones-do-brasil
    runtime: node
    plan: free
    # NODE_ENV=production makes npm omit devDependencies by default, but Vinext,
    # Vite and the Cloudflare build plugin are required during compilation.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.13.0
